<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartOS TV Remote</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>

    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #121212; color: white; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        #connection-status { font-size: 0.75rem; padding: 5px 15px; border-radius: 20px; margin-bottom: 10px; font-weight: bold; }
        .ready { background: #1a472a; color: #2ecc71; border: 1px solid #27ae60; }
        .waiting { background: #471a1a; color: #e74c3c; border: 1px solid #c0392b; }

        .header { font-size: 1.1rem; font-weight: bold; color: #0078d7; margin-bottom: 5px; text-transform: uppercase; }
        #voice-status { height: 20px; color: #00d2ff; font-size: 0.8rem; margin-bottom: 5px; text-align: center; }

        .power-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; max-width: 320px; margin-bottom: 10px; }
        .p-btn { padding: 12px; border: none; border-radius: 12px; font-weight: bold; color: white; cursor: pointer; font-size: 0.75rem; }
        .btn-green { background: #27ae60; }
        .btn-gray { background: #333; }
        .btn-red-dark { background: #8e0000; }

        #trackpad { width: 100%; height: 70px; background: rgba(255,255,255,0.05); border-radius: 20px; border: 1px dashed #444; display: flex; align-items: center; justify-content: center; color: #777; font-size: 0.7rem; margin-bottom: 10px; touch-action: none; text-transform: uppercase; text-align: center; padding: 10px; }

        .nav-wheel { width: 180px; height: 180px; background: #222; border-radius: 50%; position: relative; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 15px; border: 2px solid #333; }
        .nav-btn { position: absolute; background: transparent; border: none; color: #888; font-size: 24px; cursor: pointer; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .ok-btn { width: 70px; height: 70px; background: #333; border-radius: 50%; border: 3px solid #444; color: white; font-weight: bold; font-size: 1rem; cursor: pointer; z-index: 5; }
        
        .num-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 100%; max-width: 320px; margin-bottom: 15px; }
        .num-btn { background: #1a1a1a; border: 1px solid #333; border-radius: 10px; padding: 12px; color: #ccc; font-size: 1.2rem; font-weight: bold; cursor: pointer; }

        .mid-controls { display: flex; justify-content: center; gap: 20px; width: 100%; max-width: 320px; margin-bottom: 15px; }
        .circle-btn { width: 50px; height: 50px; border-radius: 50%; background: #2a2a2a; border: 1px solid #444; color: white; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .controls-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 100%; max-width: 320px; }
        .btn { background: #222; border: 1px solid #333; border-radius: 12px; padding: 12px; color: white; font-size: 1rem; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .btn-blue { background: #0078d7; grid-column: span 3; }
        .btn-del { background: #8e0000; color: #fff; font-weight: bold; }
        .btn-l { background: #00d2ff; color: #000; font-weight: bold; }
        .btn-yt { background: #ff0000; color: #fff; font-weight: bold; grid-column: span 3; }
        .btn-live-tv { background: #f39c12; color: #000; font-weight: bold; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="connection-status" class="waiting">SEARCHING IP...</div>
    <div class="header">SmartOS Remote</div>
    <div id="voice-status"></div>

    <div class="power-row">
        <button class="p-btn btn-green" onclick="system('power_on')">⏻ ON</button>
        <button class="p-btn btn-gray" onclick="system('power_off')">✕ CLOSE</button>
        <button class="p-btn btn-red-dark" onclick="system('pc_shutdown')">💀 PC OFF</button>
    </div>

    <div id="trackpad">Touch & Swipe to Move Cursor</div>

    <div class="nav-wheel">
        <button class="nav-btn" style="top:5px;" onclick="key('up')">▲</button>
        <button class="nav-btn" style="bottom:5px;" onclick="key('down')">▼</button>
        <button class="nav-btn" style="left:5px;" onclick="key('left')">◀</button>
        <button class="nav-btn" style="right:5px;" onclick="key('right')">▶</button>
        <button class="ok-btn" onclick="sendEnter()">OK</button>
    </div>

    <div class="num-pad">
        <button class="num-btn" onclick="sendNum('1')">1</button>
        <button class="num-btn" onclick="sendNum('2')">2</button>
        <button class="num-btn" onclick="sendNum('3')">3</button>
        <button class="num-btn" onclick="sendNum('4')">4</button>
        <button class="num-btn" onclick="sendNum('5')">5</button>
        <button class="num-btn" onclick="sendNum('6')">6</button>
        <button class="num-btn" onclick="sendNum('7')">7</button>
        <button class="num-btn" onclick="sendNum('8')">8</button>
        <button class="num-btn" onclick="sendNum('9')">9</button>
        <button class="num-btn btn-live-tv" onclick="openApp('live_tv')">LIVE</button>
        <button class="num-btn" onclick="sendNum('0')">0</button>
        <button class="num-btn" onclick="system('enter')">⏎</button>
    </div>

    <div class="mid-controls">
        <button class="circle-btn" onclick="system('back')">↩</button>
        <button id="micBtn" class="circle-btn" onclick="startVoice()">🎤</button>
        <button class="circle-btn" onclick="system('mute')">🔇</button>
    </div>

    <div class="controls-grid">
        <button class="btn" onclick="volControl('down')">🔉</button>
        <button class="btn" onclick="system('play_pause')">⏯️</button>
        <button class="btn" onclick="volControl('up')">🔊</button>
        <button class="btn btn-del" onclick="socket.emit('system_control', {action: 'delete'})">D (DELETE)</button>
        <button class="btn btn-l" onclick="socket.emit('system_control', {action: 'list'})">L (LIST)</button>
        <button class="btn btn-yt" onclick="openApp('youtube')">▶ YOUTUBE</button>
        <button class="btn btn-blue" onclick="system('home')">🏠 Gemini OS Dashboard</button>
    </div>

    <script>
        // --- ১. Firebase Config ---
        const firebaseConfig = {
            apiKey: "AIzaSyDL57aeNwn_mC8KQCdMEExigwLI9glCL_U",
            authDomain: "remote-de28e.firebaseapp.com",
            projectId: "remote-de28e",
            // এখানে আপনার এশিয়ান সার্ভার লোকেশন অনুযায়ী আপডেট করা হয়েছে
            databaseURL: "https://remote-de28e-default-rtdb.asia-southeast1.firebasedatabase.app/",
            storageBucket: "remote-de28e.firebasestorage.app",
            messagingSenderId: "335259772350",
            appId: "1:335259772350:web:4eeeeedee09a3b729c45ef"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        let socket;
        const statusEl = document.getElementById('connection-status');

        // --- ২. Real-time IP Listener ---
        database.ref('server_config').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.current_ip) {
                const pcIP = data.current_ip;
                console.log("PC IP Found: " + pcIP);
                initSocket(pcIP);
            }
        });

        function initSocket(ip) {
            if (socket) socket.disconnect();
            socket = io(`http://${ip}:5000`, { 
                reconnection: true,
                transports: ['websocket'] 
            });

            socket.on('connect', () => {
                statusEl.innerText = "GEMINI READY (" + ip + ")";
                statusEl.className = "ready";
                vibrate(100);
            });

            socket.on('disconnect', () => {
                statusEl.innerText = "CONNECTING...";
                statusEl.className = "waiting";
            });
        }

        // --- ৩. Mouse Control Logic (Trackpad) ---
        const trackpad = document.getElementById('trackpad');
        let lastX, lastY;

        trackpad.addEventListener('touchstart', e => {
            lastX = e.touches[0].clientX;
            lastY = e.touches[0].clientY;
        });

        trackpad.addEventListener('touchmove', e => {
            if (!socket || !socket.connected) return;
            const x = e.touches[0].clientX;
            const y = e.touches[0].clientY;
            const dx = (x - lastX) * 2; // Sensitivity multiplier
            const dy = (y - lastY) * 2;
            
            socket.emit('mouse_move', { x: dx, y: dy });
            lastX = x; lastY = y;
            e.preventDefault();
        }, { passive: false });

        trackpad.addEventListener('touchend', e => {
            // চাইলে এখানে সিঙ্গেল ট্যাপে ক্লিক লজিক দেয়া যায়
        });

        // --- ৪. Remote Functions ---
        function openApp(name) { if(socket) socket.emit('open_app', {name: name}); vibrate(50); }
        function volControl(dir) { if(socket) socket.emit('system_control', {action: 'vol_' + dir}); vibrate(30); }
        function sendNum(n) { if(socket) socket.emit('system_control', {action: n}); vibrate(40); }
        function sendEnter() { if(socket) socket.emit('mouse_click', {button: 'left'}); vibrate(60); }
        function system(action) { if(socket) socket.emit('system_control', {action: action}); vibrate(50); }
        function key(dir) { if(socket) socket.emit('system_control', {action: dir}); vibrate(30); }
        
        function vibrate(ms = 40) { if (navigator.vibrate) navigator.vibrate(ms); }
        
        // --- ৫. Voice Search Function ---
        function startVoice() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert("Voice Search not supported in this browser.");
                return;
            }
            const recognition = new SpeechRecognition();
            const status = document.getElementById('voice-status');
            
            recognition.onstart = () => {
                status.innerText = "Listening...";
                vibrate(100);
            };
            
            recognition.onresult = (event) => {
                const query = event.results[0][0].transcript;
                status.innerText = "Searching: " + query;
                if(socket) socket.emit('voice_search', { query: query });
            };
            
            recognition.onend = () => {
                setTimeout(() => { status.innerText = ""; }, 2000);
            };
            
            recognition.start();
        }

        setInterval(() => { if(!socket || !socket.connected) location.reload(); }, 1800000);
    </script>
</body>
</html>
