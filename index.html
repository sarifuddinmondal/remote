<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartOS TV Remote (Cloud)</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>

    <style>
        /* আপনার দেওয়া স্টাইলগুলো এখানে হুবহু থাকবে */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #121212; color: white; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        #connection-status { font-size: 0.75rem; padding: 5px 15px; border-radius: 20px; margin-bottom: 10px; font-weight: bold; }
        .ready { background: #1a472a; color: #2ecc71; border: 1px solid #27ae60; }
        .waiting { background: #471a1a; color: #e74c3c; border: 1px solid #c0392b; }
        .nav-wheel { width: 180px; height: 180px; background: #222; border-radius: 50%; position: relative; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; border: 2px solid #333; }
        .nav-btn { position: absolute; background: transparent; border: none; color: #888; font-size: 24px; cursor: pointer; width: 50px; height: 50px; }
        .ok-btn { width: 70px; height: 70px; background: #333; border-radius: 50%; border: 3px solid #444; color: white; font-weight: bold; }
        .controls-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 100%; max-width: 320px; }
        .btn { background: #222; border: 1px solid #333; border-radius: 12px; padding: 12px; color: white; cursor: pointer; }
        .btn-yt { background: #ff0000; grid-column: span 3; font-weight: bold; }
    </style>
</head>
<body>

    <div id="connection-status" class="waiting">SEARCHING FOR PC...</div>
    <div style="color:#0078d7; font-weight:bold; margin-bottom:10px;">GEMINI OS REMOTE</div>

    <div class="nav-wheel">
        <button class="nav-btn" style="top:5px;" onclick="system('up')">▲</button>
        <button class="nav-btn" style="bottom:5px;" onclick="system('down')">▼</button>
        <button class="nav-btn" style="left:5px;" onclick="system('left')">◀</button>
        <button class="nav-btn" style="right:5px;" onclick="system('right')">▶</button>
        <button class="ok-btn" onclick="system('enter')">OK</button>
    </div>

    <div class="controls-grid">
        <button class="btn" onclick="system('vol_down')">🔉</button>
        <button class="btn" onclick="system('play_pause')">⏯️</button>
        <button class="btn" onclick="system('vol_up')">🔊</button>
        <button class="btn btn-yt" onclick="openApp('youtube')">▶ YOUTUBE</button>
        <button class="btn" style="grid-column: span 3; background:#333;" onclick="system('home')">🏠 HOME</button>
    </div>

    <script>
        // আপনার ফায়ারবেস কনফিগারেশন
        const firebaseConfig = {
            apiKey: "AIzaSyDL57aeNwn_mC8KQCdMEExigwLI9glCL_U",
            authDomain: "remote-de28e.firebaseapp.com",
            projectId: "remote-de28e",
            databaseURL: "https://remote-de28e-default-rtdb.firebaseio.com/",
            storageBucket: "remote-de28e.firebasestorage.app",
            messagingSenderId: "335259772350",
            appId: "1:335259772350:web:4eeeeedee09a3b729c45ef"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let socket;
        const statusEl = document.getElementById('connection-status');

        // ফায়ারবেস থেকে আইপি রিড করা
        database.ref('server_config').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.current_ip) {
                const ip = data.current_ip;
                console.log("PC IP Found: " + ip);
                connectSocket(ip);
            }
        });

        function connectSocket(ip) {
            if (socket) socket.disconnect();
            
            socket = io(`http://${ip}:5000`, { transports: ['websocket'] });

            socket.on('connect', () => {
                statusEl.innerText = "CONNECTED TO PC (" + ip + ")";
                statusEl.className = "ready";
            });

            socket.on('disconnect', () => {
                statusEl.innerText = "OFFLINE - SEARCHING...";
                statusEl.className = "waiting";
            });
        }

        // কন্ট্রোল ফাংশন
        function system(action) { if(socket) socket.emit('system_control', {action: action}); vibrate(); }
        function openApp(name) { if(socket) socket.emit('open_app', {name: name}); vibrate(); }
        function vibrate() { if(navigator.vibrate) navigator.vibrate(40); }
    </script>
</body>
</html>
